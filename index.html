<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>

<section class="relative w-full min-h-[600px] bg-[#050505] px-6 py-16 md:px-12 lg:px-24 flex items-center overflow-hidden font-sans">
  
  <div class="absolute inset-0 w-full h-full pointer-events-none">
    <img 
      src="./images/grid.png" 
      alt="Grid Perspective Background" 
      class="w-full h-full object-cover object-bottom opacity-40 mix-blend-screen"
    >
    <div class="absolute inset-0 bg-gradient-to-t from-transparent via-[#050505]/50 to-[#050505] z-10"></div>
  </div>

  <div class="absolute top-[32%] left-[6%] w-3 h-3 bg-[#fca34d] rounded-full shadow-[0_0_12px_rgba(252,163,77,0.7)] z-20"></div>
  <div class="absolute bottom-[26%] left-[12%] w-5 h-5 bg-[#4deeea] rounded-full shadow-[0_0_18px_rgba(77,238,234,0.7)] z-20"></div>
  <div class="absolute top-[20%] right-[15%] w-3 h-3 bg-[#fca34d] rounded-full shadow-[0_0_12px_rgba(252,163,77,0.7)] z-20"></div>
  <div class="absolute bottom-[22%] right-[5%] w-5 h-5 bg-[#4deeea] rounded-full shadow-[0_0_18px_rgba(77,238,234,0.7)] z-20"></div>

  <div class="relative z-20 w-full max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-12">
    
    <div class="max-w-2xl text-white">
<img src="./images/Logo (4).png" class="mb-20" alt="">
      
      <h1 class="text-[44px] md:text-[56px] font-bold leading-[1.12] mb-12 tracking-wide text-white">
        Pleb supported<br>
        privacy focused<br>
        public <span class="inline-flex relative px-4 text-white"><span class="absolute left-0 top-[-2px] bottom-[-2px] text-white/40 font-light text-[1.15em] scale-y-[1.1]">[</span>matrix<span class="absolute right-0 top-[-2px] bottom-[-2px] text-white/40 font-light text-[1.15em] scale-y-[1.1]">]</span></span><br>
        server
      </h1>

      <button class="bg-gradient-to-r from-[#ff451d] via-[#ff7300] to-[#ffaa00] text-white font-bold text-base py-4 px-24 rounded-full shadow-[0_4px_25px_rgba(255,85,0,0.5)]">
        Join Matrix
      </button>
    </div>

    <div class="relative flex-shrink-0 z-10">
      <div class="absolute inset-0 bg-[#4deeea]/20 blur-[130px] rounded-full scale-90"></div>
    
      <img 
        src="./images/Frame (10).png" 
        alt="Bitcoin Core Graphic Element" 
        class="relative z-10 w-[380px] h-[380px] md:w-[540px] md:h-[540px] object-contain select-none"
      >
      <img 
        src="./images/bitoc.png" 
        alt="Bitcoin Core Graphic Element" 
        class="lg:bottom-22 lg:left-25 bottom-12 left-13 z-10 w-[280px] h-[280px] md:w-[340px] md:bottom-25 md:left-25 md:h-[340px] absolute object-contain select-none"
      >
    </div>
  </div>
</section>
    
</body>
</html>
